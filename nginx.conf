server {
    listen 80;
    server_name localhost;

    # 정적 파일
    location / {
        root /usr/share/nginx/html;
        index chat.html index.html;
        try_files $uri $uri/ /chat.html;
    }

    # FastAPI API
    location /api/ {
        proxy_pass http://douner-rag-app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # Swagger UI
    location /docs {
        proxy_pass http://douner-rag-app:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://douner-rag-app:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Static pages
    location = /signup {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
    }

    location = /login {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

    location = /mypage {
        root /usr/share/nginx/html;
        try_files /mypage.html =404;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}